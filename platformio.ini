; Sequoia 2026 - ESP32 Embedded Edition
; Full DAW experience on a 128x128 TFT display
;
; Requirements:
;   - ESP32-WROOM-32 (minimum 4MB flash, 520KB SRAM)
;   - ST7735 1.44" TFT Display (128x128)
;   - I2S DAC (PCM5102A recommended) for audio output
;   - Patience

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
monitor_speed = 115200
lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  bblanchon/ArduinoJson@^7.1.0
build_flags =
  -DUSER_SETUP_LOADED=1
  -DST7735_DRIVER=1
  -DTFT_WIDTH=128
  -DTFT_HEIGHT=128
  -DCGRAM_OFFSET=1
  -DST7735_GREENTAB3=1
  -DSEQUOIA_EMBEDDED=1
  -DMAX_TRACKS=256
  -DMAX_PLUGINS_PER_TRACK=16
  -DSAMPLE_RATE=96000
  -DBIT_DEPTH=32
  -DENABLE_ARA=1
  -DENABLE_VST3=1
  -DENABLE_CONVOLUTION_REVERB=1
  -DENABLE_SURROUND_71=1
  -O3
